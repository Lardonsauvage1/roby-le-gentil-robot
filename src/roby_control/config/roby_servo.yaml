###############################################################################
# Configuration MoveIt Servo pour Roby (bras 5 axes "arm")
# Adapté de panda_simulated_config.yaml (MoveIt 2.12 / Jazzy).
# Servo déduit le repère de planification (base_link) et le repère outil
# (bout du groupe "arm") depuis le groupe MoveIt + le frame_id du Twist reçu.
###############################################################################

# Remplace le scaling interne (singularité/collision) par un facteur FIXE.
# 0.0 = utilise le scaling interne (défaut). >0 = contourne la détection de
# singularité, nécessaire sur un bras 5-DOF où le Jacobien 6x5 paraît singulier
# en permanence. Compromis : on perd le ralentissement auto près des singularités
# (on s'appuiera sur la sélection de DOF du visual_servo_node à l'étape 3).
override_velocity_scaling_factor: 0.4

## Cadence de publication des commandes sortantes
publish_period: 0.02          # 50 Hz (1/cadence nominale) [s]
max_expected_latency: 0.1     # délai commande -> exécution robot [s]

## Type des commandes entrantes
# "speed_units" => le Twist est en m/s et rad/s (intuitif, ce qu'on veut).
# "unitless"    => [-1:1] type joystick (utiliserait le bloc scale ci-dessous).
command_in_type: "speed_units"
scale:
  # Utilisés uniquement si command_in_type == "unitless"
  linear: 0.2        # vitesse linéaire max [m/s]
  rotational: 0.8    # vitesse angulaire max [rad/s]
  joint: 0.5         # vitesse articulaire max (commandes joint jog)

## Type du topic de sortie attendu par le contrôleur
# Notre arm_controller = JointTrajectoryController (interface position).
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false

## Lissage des commandes sortantes (limite l'accélération -> mouvements doux)
use_smoothing: true
smoothing_filter_plugin_name: "online_signal_smoothing::AccelerationLimitedPlugin"

## Scène de planification
# move_group (lancé par demo.launch.py) est le moniteur PRIMAIRE de la scène.
# Servo s'y abonne donc en secondaire => false.
is_primary_planning_scene_monitor: false
check_octomap_collisions: false

## Propriétés MoveIt
move_group_name: arm

## Gestion des singularités et des butées articulaires
lower_singularity_threshold: 30.0          # début de décélération (proche singularité)
hard_stop_singularity_threshold: 5000.0    # TEST: arrêt dur quasi désactivé (diag 5-DOF)
# NB: seuils volontairement plus hauts que les défauts (10/30 pour un bras 6-7 DOF).
# Un bras 5 axes a un conditionnement de Jacobien naturellement plus élevé (il ne
# peut pas réaliser un twist 6-DOF arbitraire) -> sinon arrêt d'urgence quasi permanent.
leaving_singularity_threshold_multiplier: 2.0
joint_limit_margins: [0.12]                # marge ajoutée aux butées [rad] (taille 1 = tous les joints)

## Noms des topics
cartesian_command_in_topic: ~/delta_twist_cmds   # Twist cartésien entrant
joint_command_in_topic: ~/delta_joint_cmds       # commandes joint jog entrantes
joint_topic: /joint_states                       # lecture de l'état articulaire
status_topic: ~/status                           # publication du statut Servo
command_out_topic: /arm_controller/joint_trajectory   # commandes sortantes -> JTC

## Vérification de collision (tout le corps du robot)
check_collisions: true
collision_check_rate: 10.0                  # [Hz]
self_collision_proximity_threshold: 0.01    # début de décélération auto-collision [m]
scene_collision_proximity_threshold: 0.02   # début de décélération collision scène [m]
