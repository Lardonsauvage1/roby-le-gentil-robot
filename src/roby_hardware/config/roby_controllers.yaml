controller_manager:
  ros__parameters:
    update_rate: 100
    # Durcissement temps-reel : verrouille les pages memoire en RAM (mlockall)
    # pour eviter les defauts de page dans la boucle RT (cause des hoquets ~90ms
    # a la reception d'un nouveau goal de trajectoire). Necessite le droit
    # memlock (cf. /etc/security/limits.d/99-roby-rt.conf : roby memlock unlimited).
    lock_memory: true
    thread_priority: 50
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    allow_integration_in_goal_trajectories: true
    action_monitor_rate: 20.0
    # Open-loop tracking : le controller envoie la trajectoire planifiee sans
    # correction depuis la position mesuree. Necessite quand le bruit residuel
    # encoder ferait osciller un closed-loop. Pour la derive sous gravite
    # (joint_2/3), addresser cote hardware : current de hold DM860I + SW5
    # (current-decrease) OFF pour maintenir le couple max apres inactivite.
    open_loop_control: true
