default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

# Limites par joint.
# - velocity : reprises de l'URDF (robot.urdf.xacro)
# - acceleration : requises par MoveIt Servo (AccelerationLimitedPlugin) pour
#   limiter l'accélération en sortie = mouvements doux / anti-à-coup.
joint_limits:
  joint_1:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 1.0
  joint_2:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 1.0
  joint_3:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 1.0
  joint_4:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 2.0
  joint_5:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 2.0
